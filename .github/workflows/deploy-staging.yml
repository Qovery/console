name: Deploy staging

on:
  push:
    branches:
      - staging
jobs:
  test-build-and-deploy:
    uses: ./.github/workflows/test-build-and-deploy.yml
    with:
      flow: deploy-staging
      configuration: staging

      # Qovery params
      branch: staging
      project-name: R&D / Frontend
      environment-name: staging
      application-names: console
      application-commit-id: ${{ github.sha }}

    secrets:
      aws-region: ${{ secrets.AWS_REGION }}
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      s3-bucket-name: 'console-staging.qovery.com'
      cloudflare-zone: ${{ secrets.CLOUDFLARE_ZONE }}
      cloudflare-token: ${{ secrets.CLOUDFLARE_TOKEN }}
      nx-cloud-access-token: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
      codecov-token: ${{ secrets.CODECOV_TOKEN }}
      e2e-user-email: ${{ secrets.E2E_USER_EMAIL }}
      e2e-user-password: ${{ secrets.E2E_USER_PASSWORD }}
      e2e-login-method: ${{ secrets.E2E_LOGIN_METHOD }}
      e2e-sso-domain: ${{ secrets.E2E_SSO_DOMAIN }}
      e2e-project-name: ${{ secrets.E2E_PROJECT_NAME }}
      e2e-environment-name: ${{ secrets.E2E_ENVIRONMENT_NAME }}
      e2e-service-name: ${{ secrets.E2E_SERVICE_NAME }}
      slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

      # Qovery secrets
      organization-id: ${{ secrets.QOVERY_ORGANIZATION_ID }}
      api-token: ${{ secrets.QOVERY_API_TOKEN }}
