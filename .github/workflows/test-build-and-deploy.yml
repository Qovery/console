name: Test, Build And Deploy to S3

on:
  workflow_call:
    inputs:
      flow:
        required: true
        type: string
      configuration:
        required: true
        type: string

      # Qovery params
      branch:
        required: true
        type: string
      project-name:
        required: true
        type: string
      environment-name:
        required: true
        type: string
      application-names:
        required: true
        type: string
      application-commit-id:
        required: true
        type: string
    secrets:
      aws-region:
        required: false
      aws-access-key-id:
        required: false
      aws-secret-access-key:
        required: false
      s3-bucket-name:
        required: false
      cloudflare-zone:
        required: false
      cloudflare-token:
        required: false
      nx-cloud-access-token:
        required: true
      codecov-token:
        required: true
      e2e-auth-token:
        required: false
      e2e-project-id:
        required: false
      e2e-environment-id:
        required: false
      slack-webhook-url:
        required: false

      # Qovery secrets
      organization-id:
        required: true
      api-token:
        required: true

# Define a concurrency group at the branch level for the current workflows..
# Trigerred workflow will be queued and cancel the previous ones.
concurrency:
  group: ${{ github.workflow }}-s3-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  nx-main:
    name: Nx Cloud - Main Job
    runs-on: ubuntu-latest
    env:
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.nx-cloud-access-token }}
      NX_CLOUD_CONTINUOUS_ASSIGNMENT: true
      NX_PUBLIC_GIT_SHA: ${{ inputs.application-commit-id }}
      NX_PUBLIC_GTM: ${{ vars.NX_PUBLIC_GTM }}
      NX_PUBLIC_INTERCOM: ${{ vars.NX_PUBLIC_INTERCOM }}
      NX_PUBLIC_OAUTH_AUDIENCE: ${{ vars.NX_PUBLIC_OAUTH_AUDIENCE }}
      NX_PUBLIC_OAUTH_DOMAIN: ${{ vars.NX_PUBLIC_OAUTH_DOMAIN }}
      NX_PUBLIC_OAUTH_KEY: ${{ vars.NX_PUBLIC_OAUTH_KEY }}
      NX_PUBLIC_POSTHOG: ${{ vars.NX_PUBLIC_POSTHOG }}
      NX_PUBLIC_POSTHOG_APIHOST: ${{ vars.NX_PUBLIC_POSTHOG_APIHOST }}
      NX_PUBLIC_QOVERY_API: ${{ vars.NX_PUBLIC_QOVERY_API }}
      NX_PUBLIC_QOVERY_WS: ${{ vars.NX_PUBLIC_QOVERY_WS }}
      NX_PUBLIC_CHARGEBEE_PUBLISHABLE_KEY: ${{ vars.NX_PUBLIC_CHARGEBEE_PUBLISHABLE_KEY }}
      NX_PUBLIC_INSTATUS_APP_ID: ${{ vars.NX_PUBLIC_INSTATUS_APP_ID }}
      NX_PUBLIC_MINTLIFY_API_KEY: ${{ vars.NX_PUBLIC_MINTLIFY_API_KEY }}
      NX_PUBLIC_CARGO_API_TOKEN: ${{ vars.NX_PUBLIC_CARGO_API_TOKEN }}
      NX_PUBLIC_PYLON_APP_ID: ${{ vars.NX_PUBLIC_PYLON_APP_ID }}
      NX_PUBLIC_DEVOPS_COPILOT_API_BASE_URL: ${{ vars.NX_PUBLIC_DEVOPS_COPILOT_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Set affected SHAs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          base_sha="$PUSH_BASE_SHA"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base_sha="$PR_BASE_SHA"
          fi

          if [ -z "$base_sha" ] || [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
            base_sha="$(git rev-parse HEAD^)"
          fi

          echo "NX_BASE=$base_sha" >> "$GITHUB_ENV"
          echo "NX_HEAD=$HEAD_SHA" >> "$GITHUB_ENV"

      - name: Start Nx Agents
        id: start-agents
        run: |
          yarn nx start-ci-run \
            --distribute-on="3 console-ci" \
            --require-explicit-completion \
            --stop-agents-on-failure=true \
            --with-env-vars="NX_PUBLIC_GIT_SHA,NX_PUBLIC_GTM,NX_PUBLIC_INTERCOM,NX_PUBLIC_OAUTH_AUDIENCE,NX_PUBLIC_OAUTH_DOMAIN,NX_PUBLIC_OAUTH_KEY,NX_PUBLIC_POSTHOG,NX_PUBLIC_POSTHOG_APIHOST,NX_PUBLIC_QOVERY_API,NX_PUBLIC_QOVERY_WS,NX_PUBLIC_CHARGEBEE_PUBLISHABLE_KEY,NX_PUBLIC_INSTATUS_APP_ID,NX_PUBLIC_MINTLIFY_API_KEY,NX_PUBLIC_CARGO_API_TOKEN,NX_PUBLIC_PYLON_APP_ID,NX_PUBLIC_DEVOPS_COPILOT_API_BASE_URL"

      - name: Check formatting
        run: yarn nx-cloud record -- yarn nx format:check

      - name: Run distributed checks and build
        shell: bash
        run: |
          if [ "${{ inputs.flow }}" = "pull-request" ]; then
            build_configuration="development"
          else
            build_configuration="production"
          fi

          yarn nx affected --target=lint --parallel=3

          yarn nx affected \
            --target=test \
            --parallel=3 \
            --configuration=${{ inputs.configuration }} \
            --ci \
            --coverage \
            --coverageReporters=lcov

          yarn nx run console:build \
            --parallel=3 \
            --configuration="$build_configuration"

      - name: Upload build and coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-and-coverage-artifacts
          path: |
            dist/
            coverage/
            !coverage/**/*.js
            !coverage/**/*.css
            !coverage/**/*.html
            !coverage/**/*.png
          if-no-files-found: warn

      - name: Complete Nx Cloud CI run
        if: always() && steps.start-agents.outcome == 'success'
        run: yarn nx-cloud complete-ci-run

  codecoverage:
    runs-on: ubuntu-latest
    name: Code Coverage
    needs: [nx-main]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-and-coverage-artifacts
          path: coverage
          merge-multiple: true
      - name: Display structure of downloaded files
        run: ls -R
      - uses: codecov/codecov-action@v4
        with:
          directory: ./coverage/coverage
          flags: unittests # optional
          fail_ci_if_error: false # optional (default = false)
          token: ${{ secrets.codecov-token }}
          verbose: true # optional (default = false)

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: [nx-main]
    if: ${{ inputs.flow != 'pull-request' }}
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-and-coverage-artifacts
          path: dist/
          merge-multiple: true
      - name: Copy assets to S3
        run: |
          AWS_REGION=${{ secrets.aws-region }} AWS_ACCESS_KEY_ID=${{ secrets.aws-access-key-id }} AWS_SECRET_ACCESS_KEY=${{ secrets.aws-secret-access-key }} aws s3 cp ./dist/dist/apps/console/ s3://${{ secrets.s3-bucket-name }}/  --recursive --exclude "index.html"
      - name: Copy index.html to S3 last
        run: |
          AWS_REGION=${{ secrets.aws-region }} AWS_ACCESS_KEY_ID=${{ secrets.aws-access-key-id }} AWS_SECRET_ACCESS_KEY=${{ secrets.aws-secret-access-key }} aws s3 cp ./dist/dist/apps/console/index.html s3://${{ secrets.s3-bucket-name }}/

  staging-smoke-test:
    name: Staging smoke test
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ inputs.flow == 'deploy-staging' }}
    steps:
      - name: Git clone the repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: yarn
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Install Playwright browser
        run: yarn playwright install --with-deps chromium
      - name: Run staging smoke test
        env:
          E2E_BASE_URL: https://console-staging.qovery.com
          # E2E_AUTH_TOKEN is a long-lived JWT scoped to the staging test organization.
          # This smoke test intentionally skips Auth0/social login and only checks key Console pages.
          E2E_AUTH_TOKEN: ${{ secrets.e2e-auth-token }}
          E2E_PROJECT_ID: ${{ secrets.e2e-project-id }}
          E2E_ENVIRONMENT_ID: ${{ secrets.e2e-environment-id }}
        run: yarn e2e:staging
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: console-staging-smoke-report
          path: |
            dist/playwright/console-e2e-report
            dist/playwright/console-e2e
          if-no-files-found: ignore
      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack-webhook-url }}
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":":warning: Console staging smoke test failed after merge to staging\nCommit: ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' "$SLACK_WEBHOOK_URL"
